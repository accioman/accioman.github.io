<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{PAGE_TITLE}}</title>
  <meta name="description" content="{{PAGE_DESCRIPTION}}">
  <meta name="keywords" content="{{PAGE_KEYWORDS}}">
  <meta name="author" content="{{SITE_AUTHOR}}">
  <meta name="robots" content="{{PAGE_ROBOTS}}">
  <meta name="theme-color" content="{{THEME_COLOR}}">
  <link rel="canonical" href="{{PAGE_CANONICAL_URL}}">
  <meta property="og:type" content="{{OG_TYPE}}">
  <meta property="og:locale" content="{{OG_LOCALE}}">
  <meta property="og:site_name" content="{{OG_SITE_NAME}}">
  <meta property="og:title" content="{{OG_TITLE}}">
  <meta property="og:description" content="{{OG_DESCRIPTION}}">
  <meta property="og:url" content="{{PAGE_CANONICAL_URL}}">
  <meta property="og:image" content="{{OG_IMAGE_URL}}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{OG_TITLE}}">
  <meta name="twitter:description" content="{{OG_DESCRIPTION}}">
  <meta name="twitter:image" content="{{OG_IMAGE_URL}}">
  <link rel="icon" type="image/jpeg" href="./assets/images/linkedin-profile.jpg">
  <link rel="manifest" href="./site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/styles.css">
  <script type="application/ld+json">{{PAGE_JSON_LD}}</script>
  {{ANALYTICS_SNIPPET}}
</head>
<body>
  <div class="page-shell">
    {{SITE_HEADER}}
    {{PAGE_CONTENT}}
    {{SITE_FOOTER}}
  </div>

  <script type="module" src="{{SCRIPT_PATH}}"></script>
</body>
</html>
