<main class="catalog-main">
  <section class="hero hero-simple page-hero page-hero-catalog">
    <div class="hero-copy page-hero-copy">
      <p class="eyebrow" id="projects-eyebrow">Materiali pratici</p>
      <h1 id="projects-title">Progetti e deliverable</h1>
      <p class="hero-lead" id="projects-summary"></p>
    </div>
    <aside class="hero-panel page-filter-panel">
      <p class="panel-label" id="projects-filters-label">Filtri</p>
      <div class="filter-grid page-filter-grid">
        <label>
          <span id="projects-search-label">Cerca</span>
          <input id="search-input" type="search" placeholder="Corso, file o programma">
        </label>
        <label>
          <span id="projects-program-label">Percorso</span>
          <select id="program-filter"></select>
        </label>
        <label>
          <span id="projects-type-label">Tipo file</span>
          <select id="type-filter"></select>
        </label>
        <label>
          <span id="projects-status-label">Stato corso</span>
          <select id="status-filter"></select>
        </label>
      </div>
    </aside>
  </section>

  <section class="section-grid archive-layout archive-layout-preview-right catalog-layout">
    <div class="panel page-collection-panel">
      <div class="section-head">
        <h2 id="projects-section-title">Esplora i progetti</h2>
        <p class="section-copy" id="projects-section-copy">Naviga i materiali di lavoro, seleziona un file e apri l'anteprima senza uscire dalla pagina.</p>
      </div>
      <div class="project-list" id="project-list"></div>
      <p class="empty-state hidden" id="project-empty">Nessun progetto corrisponde ai filtri correnti.</p>
    </div>

    <aside class="panel panel-sticky page-preview-panel" id="preview-panel"></aside>
  </section>
</main>
