<main class="projects-main">
  <section class="hero hero-simple page-hero page-hero-projects">
    <div class="hero-copy page-hero-copy">
      <p class="eyebrow" id="projects-eyebrow">Case study verificabili</p>
      <h1 id="projects-title">Case study e deliverable</h1>
      <p class="hero-lead" id="projects-summary"></p>
      <div class="hero-actions">
        <a class="button button-primary" id="projects-primary-cta" href="./cv.html">Apri CV</a>
        <a class="button button-secondary" id="projects-secondary-cta" href="./percorsi.html">Apri percorsi</a>
      </div>
    </div>
    <aside class="hero-panel page-metric-panel">
      <p class="panel-label" id="projects-metrics-label">Snapshot</p>
      <div class="metric-grid compact" id="projects-metrics"></div>
    </aside>
  </section>

  <section class="panel projects-filter-panel">
    <div class="section-head">
      <div>
        <h2 id="projects-section-title">Case study consultabili</h2>
        <p class="section-copy" id="projects-section-copy"></p>
      </div>
    </div>
    <div class="filter-grid projects-filter-grid">
      <label>
        <span id="projects-search-label">Cerca</span>
        <input id="projects-search" type="search" placeholder="Corso, file o programma">
      </label>
      <label>
        <span id="projects-program-label">Percorso</span>
        <select id="projects-program-filter"></select>
      </label>
      <label>
        <span id="projects-type-label">Categoria</span>
        <select id="projects-type-filter"></select>
      </label>
      <label>
        <span id="projects-status-label">Stato</span>
        <select id="projects-status-filter"></select>
      </label>
    </div>
  </section>

  <section class="section-grid section-split projects-layout">
    <section class="panel projects-list-panel">
      <div class="section-head">
        <div>
          <p class="panel-label">Elenco</p>
          <h2 id="projects-list-title">Case study disponibili</h2>
        </div>
      </div>
      <div class="project-list" id="projects-list"></div>
      <p class="empty-state hidden" id="projects-empty-state"></p>
    </section>

    <section class="panel page-preview-panel projects-preview-panel" id="projects-preview-panel"></section>
  </section>
</main>
